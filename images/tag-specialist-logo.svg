<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle (optional, can be removed for transparent background) -->
  <!-- <circle cx="200" cy="200" r="190" fill="#f8fafc"/> -->
  
  <!-- Main tag symbol with bracket design -->
  <g transform="translate(200, 200)">
    <!-- Left bracket -->
    <path d="M -80 -60 L -100 -60 L -100 60 L -80 60" 
          stroke="url(#mainGradient)" 
          stroke-width="12" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Right bracket -->
    <path d="M 80 -60 L 100 -60 L 100 60 L 80 60" 
          stroke="url(#mainGradient)" 
          stroke-width="12" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Slash in the middle (like </> code tag) -->
    <line x1="-30" y1="50" x2="30" y2="-50" 
          stroke="url(#accentGradient)" 
          stroke-width="12" 
          stroke-linecap="round"/>
    
    <!-- Data points/nodes representing analytics -->
    <circle cx="-50" cy="-30" r="6" fill="#06b6d4"/>
    <circle cx="50" cy="-30" r="6" fill="#06b6d4"/>
    <circle cx="-50" cy="30" r="6" fill="#3b82f6"/>
    <circle cx="50" cy="30" r="6" fill="#3b82f6"/>
    
    <!-- Connection lines (data flow) -->
    <line x1="-50" y1="-30" x2="-50" y2="30" 
          stroke="#06b6d4" 
          stroke-width="2" 
          opacity="0.4"/>
    <line x1="50" y1="-30" x2="50" y2="30" 
          stroke="#3b82f6" 
          stroke-width="2" 
          opacity="0.4"/>
    <line x1="-50" y1="-30" x2="50" y2="-30" 
          stroke="#06b6d4" 
          stroke-width="2" 
          opacity="0.4"/>
    <line x1="-50" y1="30" x2="50" y2="30" 
          stroke="#3b82f6" 
          stroke-width="2" 
          opacity="0.4"/>
  </g>
  
  <!-- Company name -->
  <text x="200" y="310" 
        font-family="Arial, sans-serif" 
        font-size="36" 
        font-weight="700" 
        text-anchor="middle" 
        fill="#1e293b">TAG SPECIALIST</text>
  
  <!-- Tagline -->
  <text x="200" y="340" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        font-weight="400" 
        text-anchor="middle" 
        fill="#64748b"
        letter-spacing="2">DATA ENGINEERING & ANALYTICS</text>
</svg>